<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <section>
            <article>
                <h1>Hola 1</h1>
                <h2>Hola 2</h2>
                <h3>Hola 3</h3>
                <h4>Hola 4</h4>
                <h5>Hola 5</h5>
                <h6>Hola 6</h6>
            </article>
        </section>
        <section>
            <article>
                <strong>Importante</strong>
                <br>
                <b>Importante</b>
                
            </article>
            
            <article>
                <i>Cursiva</i>    
            </article>

            <article>
                <p>
                    Texto normal
                </p>
            </article>
            
            <article>
                <figure
                    id="figura-html"
                    class="imagen-articulo"
                    title="Imagen ilustrativa">
                    <!-- figure: contenido autónomo ilustrativo -->

                    <img
                        id="imagen-html"
                        class="imagen"
                        src="https://upload.wikimedia.org/wikipedia/commons/6/61/HTML5_logo_and_wordmark.svg"
                        alt="Ilustración sobre estructura HTML"
                        width="600"
                        height="300"
                        loading="lazy"
                        decoding="async"
                        referrerpolicy="no-referrer"
                        crossorigin="anonymous"
                        title="Imagen de ejemplo">
                    <!-- img: imagen -->
                    <!-- src: ruta -->
                    <!-- alt: texto alternativo -->
                    <!-- width / height: dimensiones -->
                    <!-- loading: carga diferida -->
                    <!-- decoding: modo de decodificación -->
                    <!-- referrerpolicy / crossorigin: política de solicitud -->

                    <figcaption id="caption-html">
                        Ejemplo visual de contenido acompañado por una descripción.
                    </figcaption>
                    <!-- figcaption: leyenda de la figura -->
                </figure>
            </article>
        </section>
    </main>
</body>
</html>
