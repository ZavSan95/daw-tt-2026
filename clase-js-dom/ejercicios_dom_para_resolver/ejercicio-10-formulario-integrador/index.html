<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 - Formulario integrador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Ejercicio 10 - Formulario integrador</h1>

        <form id="formulario">
            <div class="campo">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
                <p id="errorNombre" class="error"></p>
            </div>

            <div class="campo">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Ej: usuario@mail.com">
                <p id="errorEmail" class="error"></p>
            </div>

            <div class="campo">
                <label for="edad">Edad</label>
                <input type="number" id="edad" placeholder="Ej: 25">
                <p id="errorEdad" class="error"></p>
            </div>

            <button type="submit">Enviar</button>
        </form>

    </main>

    <script src="script.js"></script>
</body>
</html>
